<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Student Utility Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Smart Student Utility Calculator</h1>
    <p class="subtitle">A multi-feature calculator for students</p>

    <!-- Navigation Buttons -->
    <div class="menu">
      <button onclick="showSection('standard')">Standard</button>
      <button onclick="showSection('percentage')">Percentage</button>
      <button onclick="showSection('cgpa')">CGPA</button>
      <button onclick="showSection('si')">Simple Interest</button>
      <button onclick="showSection('age')">Age</button>
      <button onclick="showSection('bmi')">BMI</button>
    </div>

    <!-- STANDARD CALCULATOR -->
    <div id="standard" class="section">
      <h2>Standard Calculator</h2>
      <input type="text" id="display" readonly />

      <div class="calc-buttons">
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('/')">/</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('*')">*</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('-')">-</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="calculateResult()">=</button>
        <button class="clear-btn" onclick="clearDisplay()">C</button>
      </div>
    </div>

    <!-- PERCENTAGE CALCULATOR -->
    <div  id="percentage" class="section hidden">
  <h2>Percentage Calculator</h2>

  <label>Obtained Marks:</label>
  <input type="number" id="obtained" placeholder="Enter obtained marks"
         onkeydown="moveNext(event, 'total')" />

  <label>Total Marks:</label>
  <input type="number" id="total" placeholder="Enter total marks"
         onkeydown="handleLastEnter(event, 'percentage')" />

  <button onclick="calculatePercentage()">Calculate Percentage</button>
  <button onclick="resetPercentage()">Reset</button>
  <p id="percentageResult" class="result"></p>
    </div>

    <!-- CGPA CALCULATOR -->
    <div id="cgpa" class="section hidden">
  <h2>CGPA Calculator</h2>

  <label>Subject 1 Grade Point:</label>
  <input type="number" id="g1" placeholder="Enter grade point"
         onkeydown="moveNext(event, 'g2')" />

  <label>Subject 2 Grade Point:</label>
  <input type="number" id="g2" placeholder="Enter grade point"
         onkeydown="moveNext(event, 'g3')" />

  <label>Subject 3 Grade Point:</label>
  <input type="number" id="g3" placeholder="Enter grade point"
         onkeydown="moveNext(event, 'g4')" />

  <label>Subject 4 Grade Point:</label>
  <input type="number" id="g4" placeholder="Enter grade point"
         onkeydown="moveNext(event, 'g5')" />

  <label>Subject 5 Grade Point:</label>
  <input type="number" id="g5" placeholder="Enter grade point"
         onkeydown="handleLastEnter(event, 'cgpa')" />

  <button onclick="calculateCGPA()">Calculate CGPA</button>
  <button onclick="resetCGPA()">Reset</button>
  <p id="cgpaResult" class="result"></p>
</div>

    <!-- SIMPLE INTEREST CALCULATOR -->
    <div id="si" class="section hidden">
  <h2>Simple Interest Calculator</h2>

  <label>Principal Amount:</label>
  <input type="number" id="principal" placeholder="Enter principal amount"
         onkeydown="moveNext(event, 'rate')" />

  <label>Rate of Interest:</label>
  <input type="number" id="rate" placeholder="Enter rate"
         onkeydown="moveNext(event, 'time')" />

  <label>Time (years):</label>
  <input type="number" id="time" placeholder="Enter time in years"
         onkeydown="handleLastEnter(event, 'si')" />

  <button onclick="calculateSI()">Calculate Simple Interest</button>
  <button onclick="resetSI()">Reset</button>
  <p id="siResult" class="result"></p>
</div>

    <!-- AGE CALCULATOR -->
    <div id="age" class="section hidden">
      <h2>Age Calculator</h2>

      <label>Date of Birth:</label>
      <input type="date" id="dob" />

      <button onclick="calculateAge()">Calculate Age</button>
      <button onclick="resetAge()">Reset</button>
      <p id="ageResult" class="result"></p>
    </div>

    <!-- BMI CALCULATOR -->
<div id="bmi" class="section hidden">

  <h2>BMI Calculator</h2>

  <label>Weight (kg):</label>
  <input type="number" id="weight"
         placeholder="Enter weight in kg"
         onkeydown="moveNext(event, 'height')" />

  <label>Height (meters):</label>
  <input type="number" id="height"
         placeholder="Enter height in meters"
         step="0.01"
         onkeydown="handleLastEnter(event, 'bmi')" />

  <button onclick="calculateBMI()">Calculate BMI</button>
  <button onclick="resetBMI()">Reset</button>

  <p id="bmiResult" class="result"></p>

</div>


<!-- History Section -->

<div class="history-box">

    <h2>Calculation History</h2>

    <ul id="historyList"></ul>

    <button onclick="clearHistory()">
        Clear History
    </button>

</div>

</div> <!-- container close -->

<script src="script.js"></script>

</body>
</html>
